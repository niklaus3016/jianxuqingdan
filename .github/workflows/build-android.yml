name: Build Android APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.11.1'
        cache: 'npm'
    
    - name: Check Node.js version
      run: |
        node --version
        npm --version
        which node
        echo "NODE_VERSION=$NODE_VERSION"
        echo "PATH=$PATH"
    
    - name: Clean dependencies
      run: |
        rm -rf node_modules
        rm -f package-lock.json
    
    - name: Install dependencies
      run: npm install
    
    - name: Build web app
      run: npm run build
    
    - name: Check build output
      run: |
        ls -la
        ls -la dist
        cat capacitor.config.ts
    
    - name: Create Android directory and structure
      run: |
        if [ ! -d "android" ]; then
          echo "Android directory does not exist, creating..."
          mkdir -p android
          npx cap add android
        fi
        # Create necessary directories
        mkdir -p android/app/src/main/assets
        mkdir -p android/capacitor-cordova-android-plugins
        # Create cordova.variables.gradle file
        echo "// This file is generated by Capacitor" > android/capacitor-cordova-android-plugins/cordova.variables.gradle
        echo "ext.cordova = [:]" >> android/capacitor-cordova-android-plugins/cordova.variables.gradle
        echo "cordova.variables = [:]" >> android/capacitor-cordova-android-plugins/cordova.variables.gradle
    
    - name: Create release.keystore
      run: |
        cd android/app
        echo "Creating release.keystore file..."
        ls -la
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore
        ls -la
        file release.keystore
    
    - name: Create gradle.properties
      run: |
        cd android
        echo "Creating gradle.properties file..."
        ls -la
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        echo "MYAPP_RELEASE_STORE_FILE=release.keystore" >> gradle.properties
        echo "MYAPP_RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> gradle.properties
        echo "MYAPP_RELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> gradle.properties
        echo "MYAPP_RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> gradle.properties
        cat gradle.properties
    
    - name: Regenerate Gradle Wrapper
      run: |
        cd android
        echo "Regenerating Gradle Wrapper..."
        ls -la
        ls -la gradle
        ls -la gradle/wrapper
        gradle wrapper --stacktrace
    
    - name: Fix Gradle wrapper
      run: |
        cd android
        if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
          echo "gradle-wrapper.jar not found, downloading..."
          curl -O https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar
          mv gradle-wrapper.jar gradle/wrapper/
        fi
        chmod +x gradlew
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'adopt'
        java-version: '21'
    
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Sync web resources to Android
      run: |
        node --version
        which node
        echo "NODE_VERSION=$NODE_VERSION"
        echo "PATH=$PATH"
        npx cap --version
        npx cap sync android
    
    - name: Build Android Debug APK
      run: |
        cd android
        ./gradlew assembleDebug
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
    
    - name: Build Android Release APK
      run: |
        cd android
        ./gradlew assembleRelease
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: android/app/build/outputs/apk/release/app-release.apk
        retention-days: 30