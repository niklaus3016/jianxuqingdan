name: Build Android APK
on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. 设置 Node.js（必须，Capacitor 依赖）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 2. 安装项目依赖
      - name: Install dependencies
        run: npm install

      # 3. 构建 Web 代码 + 同步 Capacitor 插件（关键！）
      - name: Sync Capacitor Android
        run: |
          npm run build
          npx cap sync android

      # 4. 设置 Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      # 5. 构建 APK
      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease