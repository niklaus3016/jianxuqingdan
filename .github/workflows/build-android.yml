name: Build Android APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.11.1'
        cache: 'npm'
    
    - name: Check Node.js version
      run: |
        node --version
        npm --version
        which node
        echo "NODE_VERSION=$NODE_VERSION"
        echo "PATH=$PATH"
    
    - name: Clean dependencies
      run: |
        rm -rf node_modules
        rm -f package-lock.json
    
    - name: Install dependencies
      run: npm install
    
    - name: Build web app
      run: npm run build
    
    - name: Check build output
      run: |
        ls -la
        ls -la dist
        cat capacitor.config.ts
    
    - name: Create Android directory if it doesn't exist
      run: |
        if [ ! -d "android" ]; then
          echo "Android directory does not exist, creating..."
          mkdir -p android
        fi
    
    - name: Fix Gradle wrapper
      run: |
        cd android
        rm -rf gradle
        mkdir -p gradle/wrapper
        ls -la
        ls -la gradle
        ls -la gradle/wrapper
        curl -v -o gradle/wrapper/gradle-wrapper.jar https://services.gradle.org/distributions/gradle-8.4-wrapper.jar
        ls -la gradle/wrapper
        file gradle/wrapper/gradle-wrapper.jar
        echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
        echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
        echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
        cat gradle/wrapper/gradle-wrapper.properties
        # Create gradlew script if it doesn't exist
        if [ ! -f "gradlew" ]; then
          echo "Creating gradlew script..."
          echo "#!/usr/bin/env sh" > gradlew
          echo "" >> gradlew
          echo "executable=\"$0\"" >> gradlew
          echo "while [ -h \"$executable\" ]; do" >> gradlew
          echo "  dir=\"$(dirname \"$executable\")\"" >> gradlew
          echo "  executable=\"$(readlink \"$executable\")\"" >> gradlew
          echo "  [[ $executable != /* ]] && executable=\"$dir/$executable\"" >> gradlew
          echo "done" >> gradlew
          echo "" >> gradlew
          echo "executable_dir=\"$(dirname \"$executable\")\"" >> gradlew
          echo "cd \"$executable_dir\"" >> gradlew
          echo "" >> gradlew
          echo "if [ ! -x \"$executable_dir/gradle/wrapper/gradle-wrapper.jar\" ]; then" >> gradlew
          echo "  echo \"Error: gradle-wrapper.jar not found or not executable\"" >> gradlew
          echo "  exit 1" >> gradlew
          echo "fi" >> gradlew
          echo "" >> gradlew
          echo "java \"-Dorg.gradle.appname=gradlew\" -classpath \"$executable_dir/gradle/wrapper/gradle-wrapper.jar\" org.gradle.wrapper.GradleWrapperMain \"$@\"" >> gradlew
          chmod +x gradlew
        else
          chmod +x gradlew
        fi
        ls -la gradlew
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'adopt'
        java-version: '21'
    
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Sync web resources to Android
      run: |
        node --version
        which node
        echo "NODE_VERSION=$NODE_VERSION"
        echo "PATH=$PATH"
        npx cap --version
        npx cap sync android
    
    - name: Build Android Debug APK
      run: |
        cd android
        ./gradlew assembleDebug
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30